---
layout: default
---

<style type="text/css">
	h2 {
		color: #FFFFFF;
	}
	
	.post-preview {}
</style>

{% for post in site.posts %}
<div class="container-fluid post-preview p-2 mt-2">
	<h2>{{ post.title }}</h2>
	<p>{{ post.date | date_to_string }} - {{ post.author }}</p>
	
	{{ post.excerpt }}
	
	<a class="btn btn-outline-light" href="{{ post.url }}"><i class="bi bi-file-text-fill"></i> Ler mais</a>
	<hr>
</div>
{% endfor %}

{{ content }}
