---
layout: default
---

<style type="text/css">
	.post-page {
		border: 2px solid #888888;
		border-radius: 2px;
	}
	
	p {
		padding: 12px;
	}
</style>

<div class="post-page p-4 m-4">
	<h1>{{ page.title }}</h1>
	<p>{{ page.date | date_to_string }} - {{ page.author }}</p>
	<hr>
	
	{{ content }}
</div>
